<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>灵犀查询 | 多功能信息助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f9 0%, #d9e2ef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* 主容器 */
        .query-hub {
            max-width: 820px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2rem;
            box-shadow: 0 30px 55px -20px rgba(0, 0, 0, 0.3), 0 2px 6px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* 顶部渐变区 */
        .hero-section {
            background: linear-gradient(120deg, #143450, #1f5582);
            padding: 1.6rem 2rem;
            color: white;
        }

        .hero-section h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hero-section h1:before {
            content: "🔍";
            font-size: 2rem;
        }

        .hero-section p {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-top: 6px;
        }

        /* 标签栏 */
        .tabs-container {
            background: #ffffff;
            padding: 0 1.5rem;
            border-bottom: 1px solid #eef2f8;
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 1rem 1.3rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: #4a627a;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-bottom: 3px solid transparent;
            margin-bottom: -1px;
        }

        .tab-btn i {
            font-style: normal;
            font-size: 1.1rem;
        }

        .tab-btn:hover {
            color: #1f5e8c;
            background: #f5f9ff;
        }

        .tab-btn.active {
            color: #1b6b9e;
            border-bottom-color: #1b6b9e;
            background: #f9fcff;
        }

        /* 内容公共样式 */
        .tab-pane {
            display: none;
            padding: 2rem 2rem 1.8rem;
            animation: fadeSlide 0.25s ease-out;
        }

        .tab-pane.active-pane {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .query-button {
            width: 100%;
            background: linear-gradient(100deg, #22668d, #144f72);
            border: none;
            padding: 0.85rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin: 0.5rem 0 1.2rem 0;
        }

        .query-button:hover {
            background: linear-gradient(100deg, #1b577c, #0f3f5b);
            transform: scale(0.98);
        }

        .result-area {
            background: #f6fafd;
            border-radius: 1.3rem;
            padding: 1.2rem 1.5rem;
            border: 1px solid #e2edf6;
            margin-top: 0.5rem;
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            color: #1f5985;
            border-bottom: 1px dashed #cde0ef;
            padding-bottom: 0.6rem;
            margin-bottom: 0.9rem;
        }

        .result-content {
            color: #244c6b;
            font-size: 0.92rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .demo-note {
            font-size: 0.7rem;
            color: #7a99b5;
            text-align: right;
            margin-top: 0.8rem;
            border-top: 1px solid #e2ecf5;
            padding-top: 0.6rem;
        }

        /* 快递专属快捷链接区域 */
        .express-links {
            background: white;
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            margin-bottom: 1.6rem;
            border: 1px solid #ecf3fa;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .link-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .official-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f8fbfe;
            padding: 0.45rem 1.2rem;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1f4162;
            border: 1px solid #dee7f0;
            transition: 0.2s;
        }
        .official-link:hover {
            background: #eef4fc;
            transform: translateY(-1px);
            border-color: #bbd2e9;
        }
        .badge {
            background: #e9f2fa;
            font-size: 0.7rem;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            color: #2f6b8f;
        }

        footer {
            background: #fafcfe;
            padding: 0.9rem;
            text-align: center;
            font-size: 0.7rem;
            color: #7795b0;
            border-top: 1px solid #ecf3fa;
        }

        @media (max-width: 620px) {
            .tabs-container {
                padding: 0 0.8rem;
            }
            .tab-btn {
                padding: 0.75rem 0.9rem;
                font-size: 0.85rem;
            }
            .tab-pane {
                padding: 1.5rem 1.2rem;
            }
            .hero-section h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="query-hub">
    <div class="hero-section">
        <h1>信息查询中心</h1>
        <p>快递 · 天气 · 号码 | 一站式查询中心</p>
    </div>

    <!-- 标签栏：扩展更多查询类型 -->
    <div class="tabs-container">
        <button class="tab-btn active" data-tab="express">📦 快递查询</button>
        <button class="tab-btn" data-tab="weather">☁️ 天气查询</button>
        <button class="tab-btn" data-tab="phone">📱 手机归属</button>
        <button class="tab-btn" data-tab="idcard">🆔 解读</button>
    </div>

    <!-- 1. 快递查询面板 -->
    <div class="tab-pane active-pane" id="expressPane">
        <!-- 保留原有京东/顺丰链接，并增加快捷入口（完全符合原有结构） -->
        <div class="express-links">
            <div class="link-buttons">
                <a href="https://www.jdl.com/orderSearch/" target="_blank" rel="noopener noreferrer" class="official-link">📦 京东快递官网</a>
                <a href="#" id="sfExpressBtn" class="official-link">✈️ 顺丰快递官网</a>
                
            </div>
        </div>
        
    </div>

    <!-- 2. 天气查询面板 -->
    <div class="tab-pane" id="weatherPane">
        <div class="link-buttons">
            <a href="https://www.jdl.com/orderSearch/" target="_blank" rel="noopener noreferrer" class="official-link">📦 京东快递官网</a>
            <a href="#" id="sfExpressBtn" class="official-link">✈️ 顺丰快递官网</a>
                
        </div>
        
    </div>

    <!-- 3. 手机归属查询 -->
    <div class="tab-pane" id="phonePane">
        <div class="link-buttons">
            <a href="https://www.jdl.com/orderSearch/" target="_blank" rel="noopener noreferrer" class="official-link">📦 京东快递官网</a>
            <a href="#" id="sfExpressBtn" class="official-link">✈️ 顺丰快递官网</a>
                
        </div>        
        
    </div>

    <!-- 4. 身份证解读 -->
    <div class="tab-pane" id="idcardPane">
        <div class="link-buttons">
            <a href="https://www.jdl.com/orderSearch/" target="_blank" rel="noopener noreferrer" class="official-link">📦 京东快递官网</a>
            <a href="#" id="sfExpressBtn" class="official-link">✈️ 顺丰快递官网</a>
                
        </div>        
        
    </div>

    <footer>
        ⚡ 多功能查询 · 支持快递 / 天气 / 手机归属 / 身份证解读（全部为模拟演示，提升交互体验）
    </footer>
</div>

<script>
    (function() {
        // ----- 标签页切换逻辑 -----
        const tabs = document.querySelectorAll('.tab-btn');
        const panes = document.querySelectorAll('.tab-pane');
        
        function switchTab(tabId) {
            panes.forEach(pane => pane.classList.remove('active-pane'));
            const activePane = document.getElementById(tabId + 'Pane');
            if (activePane) activePane.classList.add('active-pane');
            
            tabs.forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-tab') === tabId) {
                    btn.classList.add('active');
                }
            });
        }
        
        tabs.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tabValue = btn.getAttribute('data-tab');
                switchTab(tabValue);
            });
        });
        
        
    })();
</script>
</body>
</html>
