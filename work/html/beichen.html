<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>北辰 · 数字化工作台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eef2f7 0%, #d4dfed 100%);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* 装饰光晕 */
        body::before {
            content: '';
            position: absolute;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(79, 109, 179, 0.2) 0%, rgba(79, 109, 179, 0) 70%);
            border-radius: 50%;
            top: -80px;
            left: -80px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 340px;
            height: 340px;
            background: radial-gradient(circle, rgba(56, 182, 255, 0.18) 0%, rgba(56, 182, 255, 0) 70%);
            border-radius: 50%;
            bottom: -100px;
            right: -70px;
            pointer-events: none;
            z-index: 0;
        }

        /* 主容器 */
        .dashboard {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 2;
            transition: all 0.2s;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            color: #2c5a7a;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
            margin-bottom: 1.2rem;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .back-link:hover {
            background: white;
            transform: translateX(-4px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(125deg, #1F2F4F, #2C4C6E);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .header h1::before {
            content: "⛰️";
            font-size: 2.6rem;
            color: #2c5a7a;
        }

        .header h1::after {
            content: "✨";
            font-size: 2.6rem;
            color: #2c5a7a;
        }

        .sub {
            color: #2c3e50cc;
            margin-top: 0.5rem;
            font-weight: 500;
            font-size: 1rem;
            background: rgba(235, 245, 255, 0.7);
            display: inline-block;
            padding: 0.3rem 1.4rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        /* 卡片网格 — 三个数字化入口 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 2rem;
            margin: 2rem 0 1rem;
        }

        /* 卡片样式 */
        .work-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 1.8rem;
            padding: 2rem 1.5rem;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.75);
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .work-card:hover {
            transform: translateY(-8px);
            background: #ffffff;
            box-shadow: 0 24px 36px -12px rgba(0, 0, 0, 0.25);
            border-color: rgba(255, 255, 255, 1);
        }

        .work-card:active {
            transform: translateY(-3px);
        }

        /* 卡片光晕 */
        .work-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 20%, rgba(255,245,225,0.5), transparent 70%);
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            border-radius: 1.8rem;
        }

        .work-card:hover::after {
            opacity: 1;
        }

        .card-icon {
            font-size: 3.8rem;
            filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.1));
            transition: transform 0.25s ease;
        }

        .work-card:hover .card-icon {
            transform: scale(1.05) rotate(2deg);
        }

        .card-title {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(125deg, #1F2F4F, #2C4C6E);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 0.5px;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #4a627a;
            font-weight: 500;
            background: rgba(100, 120, 150, 0.1);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            transition: all 0.2s;
        }

        .work-card:hover .card-desc {
            background: rgba(70, 110, 150, 0.15);
            color: #1f374e;
        }

        /* 其他内容区域（原第二个div）— 预留扩展 */
        .extra-section {
            margin-top: 3rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            color: #3a5c7c;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .extra-section:hover {
            background: rgba(255, 255, 255, 0.6);
        }

        .extra-section .placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .extra-section .placeholder span {
            background: rgba(44, 92, 122, 0.1);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        /* 底部装饰 */
        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #2c3e50aa;
            border-top: 1px dashed rgba(72, 94, 144, 0.3);
            padding-top: 1.5rem;
        }

        /* 响应式 */
        @media (max-width: 680px) {
            .dashboard {
                padding: 1.5rem;
            }
            .header h1 {
                font-size: 2.2rem;
            }
            .card-title {
                font-size: 1.6rem;
            }
            .card-icon {
                font-size: 3rem;
            }
            .cards-grid {
                gap: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 链接占位符点击提示（因为href为空，防止跳转） */
        .work-card[href="#"] {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <!-- <a href="../index.html" class="back-link" title="返回工作台">← 返回 myWork</a> -->

        <div class="sub">数字化中枢 · 高效协同</div>

</html>
